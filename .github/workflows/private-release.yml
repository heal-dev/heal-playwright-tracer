name: Private Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.title, 'chore: bump version to'))
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version from package.json
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version to publish: $NEW_VERSION"

      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "Publishing RC version $VERSION with tag 'rc'"
            npm publish --tag rc --registry=https://npm.pkg.github.com
          else
            echo "Publishing stable version $VERSION with tag 'latest'"
            npm publish --registry=https://npm.pkg.github.com
          fi

      - name: Get commit history
        id: commits
        if: success()
        run: |
          # Find the previous version bump commit
          PREVIOUS_VERSION_COMMIT=$(git log --grep="^chore: bump version to" --format="%H" -n 1 HEAD^ || echo "")

          if [ -z "$PREVIOUS_VERSION_COMMIT" ]; then
            echo "No previous version bump commit found, showing last 10 commits"
            COMMITS=$(git log -10 --oneline --no-merges)
          else
            echo "Getting commits since previous version bump: $PREVIOUS_VERSION_COMMIT"
            COMMITS=$(git log ${PREVIOUS_VERSION_COMMIT}..HEAD --oneline --no-merges)
          fi

          # Format commits for Slack (limit to 15 and escape special characters)
          # Convert newlines to \n for Slack's mrkdwn format
          FORMATTED_COMMITS=$(echo "$COMMITS" | head -15 | sed 's/^/• /' | sed 's/"/\\"/g' | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')

          # Count total commits
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l | xargs)

          # Store in GITHUB_OUTPUT (handle multiline)
          {
            echo "formatted_commits<<EOF"
            echo "$FORMATTED_COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "previous_version_commit=$PREVIOUS_VERSION_COMMIT" >> $GITHUB_OUTPUT

          # Get package name from package.json
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "attachments": [
                {
                  "color": "28a745",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "📦 heal-playwright-tracer v${{ steps.version.outputs.new_version }} Published Successfully${{ contains(steps.version.outputs.new_version, '-rc.') && ' (RC)' || '' }}",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Package*\n`${{ steps.commits.outputs.package_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Version*\n`${{ steps.version.outputs.new_version }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by*\n${{ github.actor }}"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*📝 Changes (${{ steps.commits.outputs.commit_count }} commits)*\n${{ steps.commits.outputs.formatted_commits }}"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View GitHub Action> | <https://github.com/${{ github.repository }}/packages|View Package>"
                      }
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "attachments": [
                {
                  "color": "ea5455",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "❌ heal-playwright-tracer Publish Failed",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by*\n${{ github.actor }}"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Status*\nFailed"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Failed GitHub Action>"
                      }
                    }
                  ]
                }
              ]
            }
