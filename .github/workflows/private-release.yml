name: Private Release

on:
  # Manual-only trigger — gated by the `release` environment's required reviewers.
  # There is intentionally no `pull_request` auto-publish path: a forgeable PR
  # title is too weak a signal to authorize publishing a package version.
  workflow_dispatch:
    inputs:
      confirm_version:
        description: 'Exact version in package.json to publish (e.g. 1.2.3 or 1.3.0-rc.4). The workflow aborts if this does not match.'
        required: true
        type: string

# Default to minimum privileges; the publish job elevates only what it needs.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write # publish to GitHub Packages via GITHUB_TOKEN
      id-token: write # npm provenance / sigstore

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: '@heal-dev'

      - name: Verify input matches package.json version
        # Input is passed through an env var (not interpolated into the script)
        # to prevent workflow script injection via a crafted `confirm_version`
        # value. See: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          INPUT_VERSION: ${{ inputs.confirm_version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" != "$INPUT_VERSION" ]]; then
            echo "::error::Refusing to publish: input does not match package.json version '$PKG_VERSION'."
            echo "::error::Bump package.json on main first, or pass the exact current version as input."
            exit 1
          fi
          echo "Version gate OK: $PKG_VERSION"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Read version from package.json
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version to publish: $NEW_VERSION"

      - name: Publish to GitHub Packages
        env:
          # GITHUB_TOKEN scoped by the job `permissions:` block above.
          # Explicit --registry keeps this workflow targeted at GitHub Packages
          # only; manual releases to the public npm registry are published
          # out-of-band and must not be affected by this workflow.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "Publishing RC version $VERSION with tag 'rc' to GitHub Packages"
            npm publish --provenance --tag rc --registry=https://npm.pkg.github.com
          else
            echo "Publishing stable version $VERSION with tag 'latest' to GitHub Packages"
            npm publish --provenance --registry=https://npm.pkg.github.com
          fi

      - name: Get commit history
        id: commits
        if: success()
        run: |
          # Find the previous version bump commit
          PREVIOUS_VERSION_COMMIT=$(git log --grep="^chore: bump version to" --format="%H" -n 1 HEAD^ || echo "")

          if [ -z "$PREVIOUS_VERSION_COMMIT" ]; then
            echo "No previous version bump commit found, showing last 10 commits"
            COMMITS=$(git log -10 --oneline --no-merges)
          else
            echo "Getting commits since previous version bump: $PREVIOUS_VERSION_COMMIT"
            COMMITS=$(git log ${PREVIOUS_VERSION_COMMIT}..HEAD --oneline --no-merges)
          fi

          # Format commits for Slack (limit to 15 and escape special characters)
          # Convert newlines to \n for Slack's mrkdwn format
          FORMATTED_COMMITS=$(echo "$COMMITS" | head -15 | sed 's/^/• /' | sed 's/"/\\"/g' | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')

          # Count total commits
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l | xargs)

          # Store in GITHUB_OUTPUT (handle multiline)
          {
            echo "formatted_commits<<EOF"
            echo "$FORMATTED_COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "previous_version_commit=$PREVIOUS_VERSION_COMMIT" >> $GITHUB_OUTPUT

          # Get package name from package.json
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "attachments": [
                {
                  "color": "28a745",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "📦 heal-playwright-tracer v${{ steps.version.outputs.new_version }} Published Successfully${{ contains(steps.version.outputs.new_version, '-rc.') && ' (RC)' || '' }}",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Package*\n`${{ steps.commits.outputs.package_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Version*\n`${{ steps.version.outputs.new_version }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by*\n${{ github.actor }}"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*📝 Changes (${{ steps.commits.outputs.commit_count }} commits)*\n${{ steps.commits.outputs.formatted_commits }}"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View GitHub Action> | <https://github.com/${{ github.repository }}/packages|View Package>"
                      }
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "attachments": [
                {
                  "color": "ea5455",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "❌ heal-playwright-tracer Publish Failed",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by*\n${{ github.actor }}"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Status*\nFailed"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Failed GitHub Action>"
                      }
                    }
                  ]
                }
              ]
            }
