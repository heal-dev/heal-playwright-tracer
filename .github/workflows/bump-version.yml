name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: 'patch'

# Default to minimum privileges; the bump job elevates only what it needs.
permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create branch + commit
      pull-requests: write # open the bump PR

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.version_bump }} --preid rc --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "branch_name=chore/bump-version-v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create branch and commit
        run: |
          git checkout -b ${{ steps.version.outputs.branch_name }}
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.branch_name }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.new_version }}" \
            --body "Automated version bump to \`${{ steps.version.outputs.new_version }}\`. Merge this PR, then run the **Private Release** workflow to publish to GitHub Packages." \
            --base main \
            --head ${{ steps.version.outputs.branch_name }}
